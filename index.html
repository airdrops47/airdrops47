            --primary-light: #9d4edd;

            --background: #0f0c29;
            --background-light: #1a1a2e;

            --card-hover: #1e3a8a;
            --text: #f8fafc;

            --error: #ff4d4d;
            --success: #00c853;
            --warning: #ffab00;
            --info: #00b4d8;
           --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            --border-radius: 16px;
            --box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            --transition: all 0.3s ease;
        
         }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #100f1c;
            color: #e0e0e0;

            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        body::before,

            content: '';
            position: fixed;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #ffae00, #cc33ff);
            z-index: 10;
        }
        body::before {
            top: 0;
        }
        body::after {
            bottom: 0;
        }

            padding: 20px;

        /* Header Styles */
        header {

            border-radius: var(--border-radius);

            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
         
        
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(138,43,226,0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }
        
        /* Badges */

            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .vip-badge {
            background: var(--gradient);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(138,43,226,0.3);
            animation: pulse 2s infinite;
        }
        
        .alert-badge {
            background: var(--gradient);
            color: white;
            padding:8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(138,43,226,0.3);
            animation: pulse 2s infinite;
       }
        
     @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* User Info */
        .user-info {
            margin: 20px 0;
        }
        
        .name {
            font-size: 28px;
            margin: 10px 0;
            font-weight: bold;
           background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        
        .web3-tag {
            background: rgba(138, 43, 226, 0.2);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid rgba(138,43,226,0.3);
        }

            position: relative;
            
            
             }
        
        #searchInput {

            color: white;
            font-size: 16px;

            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);

        #searchInput:focus {

        .search-icon {

            color: var(--text-secondary);

        }

}

.name {
  display: inline-block;
  padding: 10px 20px;
  border: 2px dashed transparent;
  border-radius: 10px;
  font-weight: bold;
  color: orange;
  position: relative;
  background-color: #0b1b3a; /* dark bg */
}

.name::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border: 0px dashed;
  border-radius: 16px;
  background: linear-gradient(
    270deg,
    #ff8800,
    #ff00cc,
    #00b4d8,
    #00ff95,
    #ff8800
  );
  background-size: 400% 400%;
  animation: borderMove 4s linear infinite;

  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  padding: 2px;
  z-index: 1;
  pointer-events: none;
}

@keyframes borderMove {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 100% 50%;
  }

            
            
            
            
            
        }
        
        .visit-btn:hover {

            font-size: 12px;

        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            animation: modalFadeIn 0.3s ease-out;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .close-modal { 
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .close-modal:hover {
            color: var(--error);
            transform: rotate(90deg);
        }
        
        /* Notifications */
        .notification {
            position: fixed;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            display: none; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease-out;
            max-width: 90%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
        }
        
        .copy-notification {
            top: 20px;
            background: var(--success);
        }
        
        .error-notification {
            top: 20px; 
            background: var(--error);
        }
        
        .notification-close {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) translateX(-50%); }
            to { opacity: 1; transform: translateY(0) translateX(-50%); }
        }
        
        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 50px;
            margin-bottom: 20px;
            color: var(--primary);
            opacity: 0.5;
        }
        
        .empty-state p {
            margin-top: 10px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .links-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            header {
                padding: 20px 15px;
            }
            
            .name {
                font-size: 24px;
            }
            
            .modal-content { 
                padding: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .links-container {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-direction: column;
                align-items: flex-start;
            }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--background);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }
        
        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            grid-column: 1 / -1;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(138,43,226,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

            startLinkSync();
            updateStats();
            window.addEventListener('online', handleOnlineStatusChange);
            window.addEventListener('offline', handleOnlineStatusChange);
            handleOnlineStatusChange();
        }

        function handleOnlineStatusChange() {
            if (elements.connectionStatus) {
                if (navigator.onLine) {
                    elements.connectionStatus.textContent = 'Online';
                    elements.connectionStatus.style.color = 'var(--success)';
                } else {
                    elements.connectionStatus.textContent = 'Offline';
                    elements.connectionStatus.style.color = 'var(--error)';
                }
            }
        }

        function setupEventListeners() {
            if (elements.searchInput) {
                elements.searchInput.addEventListener('input', debounce(handleSearch, 300));
            }
            elements.notificationCloseButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const notification = e.target.closest('.notification');
                    if (notification) hideNotification(notification);
                });
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    // closeAllModals(); // If modals are used in future
                    if (elements.copyNotification.classList.contains('visible')) hideNotification(elements.copyNotification);
                    if (elements.errorNotification.classList.contains('visible')) hideNotification(elements.errorNotification);
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    if (elements.searchInput) elements.searchInput.focus();
                }
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        function handleSearch() { filterLinks(); }

        function filterLinks() {
            const searchTerm = elements.searchInput ? elements.searchInput.value.toLowerCase().trim() : "";
            filteredLinks = !searchTerm ? [...allLinks] : allLinks.filter(link =>
                (link.title && link.title.toLowerCase().includes(searchTerm)) ||
                (link.description && link.description.toLowerCase().includes(searchTerm)) ||
                (link.referral && link.referral.toLowerCase().includes(searchTerm))
            );
            renderLinks();
        }

        function renderLinks() {
            if (!elements.linksContainer) return;
            const fragment = document.createDocumentFragment();
            elements.linksContainer.innerHTML = ''; // Clear previous before adding new

            if (filteredLinks.length === 0) {
                const emptyState = document.createElement('div');
                emptyState.className = 'empty-state';
                emptyState.innerHTML = `<i class="fas fa-folder-open"></i><h3>No links found</h3><p>Try adjusting your search.</p>`;
                fragment.appendChild(emptyState);
            } else {
                filteredLinks.forEach((link, index) => { // Added index for stagger
                    const linkCard = document.createElement('div');
                    linkCard.className = 'link-card'; // 'visible' class added by JS
                    linkCard.setAttribute('data-id', link.id);
                    const defaultIconOnError = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iIzk0YTNiOCIgZD0iTTEyLDJDNi40OCwyLDIsNi40OCwyLDEyUzYuNDgsMjIsMTIsMjJzMTAtNC40OCwxMC0xMFMxNy41MiwyLDEyLDJ6bTAtMWM0LjU4LDAsOC4zMSwzLjczLDguMzEsOC4zMVMxNi41OCwyMC4zMSwxMiwyMC4zMSBTMy42OSwxNi41OCwzLjY5LDEyUzcuNDIsMy42OSwxMiwzLjY5ek0xMSwxN2gxdjFoLTF2LTFoMWwtMy0zaC0xdjFoMVYxNkgxMXYxSDhMNiwxNUg1VjEzSDZWMTFINTVWOUg2TDgsN0g4VjZIOVY1aDRWOUgxMVY3aDJMODwxM0gxMXYxaDJMMTEsMTd6Ii8+PC9zdmc+';

                    linkCard.innerHTML = `
                        <div class="link-header">
                            <img src="${link.icon}" alt="${link.title} icon" class="link-icon" loading="lazy" onerror="this.onerror=null;this.src='${defaultIconOnError}'; this.alt='Generic Link Icon';">
                            <div class="link-title">${link.title}</div>
                        </div>
                        ${link.description ? `<div class="link-description">${link.description}</div>` : ''}
                        ${link.referral ? `
                        <div class="referral-code">
                            <div class="referral-info">
                                <span>Referral: </span>
                                <span class="code" title="${link.referral}">${link.referral}</span>
                            </div>
                            <button class="copy-btn" data-code="${link.referral}" aria-label="Copy referral code ${link.referral}">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                        ` : ''}
                        <div class="card-footer">
                            <div class="link-date">${formatDate(link.timestamp)}</div>
                            <button class="visit-btn" data-url="${link.url}" aria-label="Visit ${link.title}">
                                <i class="fas fa-external-link-alt"></i> Visit
                            </button>
                        </div>
                    `;
                    fragment.appendChild(linkCard);
                    // STAGGERED CARD ANIMATION TRIGGER
                    setTimeout(() => {
                        linkCard.classList.add('visible');
                    }, index * 75); // 75ms delay per card
                });
            }
            elements.linksContainer.appendChild(fragment);
            updateStats();
            addDynamicEventListeners();
        }

        function addDynamicEventListeners() {
            elements.linksContainer.querySelectorAll('.copy-btn').forEach(btn => {
                const newBtn = btn.cloneNode(true); // Prevents duplicate listeners on re-render
                btn.parentNode.replaceChild(newBtn, btn);
                newBtn.addEventListener('click', function() {
                    copyToClipboard(this.getAttribute('data-code'));
                });
            });
            elements.linksContainer.querySelectorAll('.visit-btn').forEach(btn => {
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                newBtn.addEventListener('click', function() {
                    const url = this.getAttribute('data-url');
                    if (url && url !== "#" && url.trim() !== "") {
                        window.open(url, '_blank', 'noopener,noreferrer');
                    } else {
                        showNotification('error', 'Invalid or missing URL.');
                    }
                });
            });
        }

        function updateStats() {
            const total = allLinks.length;
            if (elements.totalLinks) elements.totalLinks.textContent = `${total} Link${total !== 1 ? 's' : ''}`;
            if (allLinks.length > 0) {
                lastUpdateTime = Math.max(...allLinks.map(link => link.timestamp));
            } else { lastUpdateTime = 0; }
            if (elements.lastUpdated) elements.lastUpdated.textContent = `Updated: ${lastUpdateTime ? formatTime(lastUpdateTime) : 'N/A'}`;
            handleOnlineStatusChange();
        }

        function startLinkSync() { setInterval(updateStats, SYNC_INTERVAL); }

        function copyToClipboard(text) {
            if (!text) { showNotification('error', 'Nothing to copy.'); return; }
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showNotification('success', 'Copied to clipboard!');
                }).catch(err => {
                    console.warn('Async clipboard copy failed, trying fallback:', err);
                    fallbackCopyToClipboard(text);
                });
            } else { fallbackCopyToClipboard(text); }
        }

        function fallbackCopyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus(); textarea.select();
            try {
                if (document.execCommand('copy')) showNotification('success', 'Copied! (fallback)');
                else showNotification('error', 'Fallback copy failed.');
            } catch (err) {
                console.error('Fallback copy error:', err);
                showNotification('error', 'Failed to copy.');
            }
            document.body.removeChild(textarea);
        }

        function showNotification(type, message) {
            const notification = (type === 'success') ? elements.copyNotification : elements.errorNotification;
            if (!notification) return;

            if (type === 'error' && elements.errorMessage) elements.errorMessage.textContent = message;

            if (notification.dataset.timeoutId) clearTimeout(parseInt(notification.dataset.timeoutId));

            notification.style.display = 'flex';
            requestAnimationFrame(() => { // Ensures display:flex is applied before class for transition
                notification.classList.add('visible');
            });

            const timeoutId = setTimeout(() => hideNotification(notification), 3000);
            notification.dataset.timeoutId = timeoutId.toString();
        }

        function hideNotification(notification) {
            if (!notification) return;
            if (notification.dataset.timeoutId) {
                clearTimeout(parseInt(notification.dataset.timeoutId));
                delete notification.dataset.timeoutId;
            }
            notification.classList.remove('visible');
            // display:none is handled by the timeout after transition
            setTimeout(() => {
                if (!notification.classList.contains('visible')) { // Check if it wasn't re-shown
                     notification.style.display = 'none';
                }
            }, 300); // Match CSS transition duration
        }

        function formatTime(timestamp) {
            if (!timestamp || isNaN(timestamp)) return 'N/A';
            try { return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
            catch (e) { return 'Invalid Date'; }
        }
        function formatDate(timestamp) {
            if (!timestamp || isNaN(timestamp)) return 'N/A';
            try { return new Date(timestamp).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }); }
            catch (e) { return 'Invalid Date'; }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
